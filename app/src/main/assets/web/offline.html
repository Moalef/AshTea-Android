<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>آشتی - بدون اتصال</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #f7f7f9;
            color: #222;
            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Tahoma,
                Arial,
                sans-serif;
        }

        .offline-card {
            width: 100%;
            max-width: 420px;
            padding: 40px 28px;
            text-align: center;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .logo {
            margin-bottom: 28px;
            font-size: 42px;
            font-weight: 700;
            color: #1a1a2e;
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: #f0f0f4;
            font-size: 38px;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 24px;
            font-weight: 700;
        }

        p {
            margin: 0 auto 28px;
            line-height: 1.9;
            font-size: 16px;
            color: #666;
        }

        .retry-button {
            display: inline-block;
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            background: #1a1a2e;
            color: #ffffff;
            font-size: 16px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        .retry-button:active {
            transform: scale(0.98);
        }

        .hint {
            margin-top: 20px;
            font-size: 13px;
            color: #999;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: #121212;
                color: #ffffff;
            }

            .offline-card {
                background: #1e1e1e;
            }

            .logo {
                color: #ffffff;
            }

            .icon {
                background: #2a2a2a;
            }

            p {
                color: #b5b5b5;
            }

            .hint {
                color: #777;
            }

            .retry-button {
                background: #ffffff;
                color: #1a1a2e;
            }
        }
    </style>
</head>

<body>

    <main class="offline-card">

        <div class="logo">آشتی</div>

        <div class="icon">↯</div>

        <h1>اتصال برقرار نیست</h1>

        <p>
            در حال حاضر امکان اتصال به آشتی وجود ندارد.
            لطفاً اتصال اینترنت خود را بررسی کنید و دوباره تلاش کنید.
        </p>

        <button class="retry-button" onclick="retryConnection()">
            تلاش مجدد
        </button>

        <div class="hint">
            اگر از VPN استفاده می‌کنید، آن را خاموش کنید و دوباره تلاش کنید.
        </div>

    </main>

    <script>
        function retryConnection() {
            window.location.href = "https://ashtea.ir/";
        }
    </script>

</body>
</html>
